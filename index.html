<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Elektronik</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .hitung{
            background:green;
        }

        .reset{
            background:brown;
        }

        #hasil{
            margin-top:20px;
            background:#eee;
            padding:15px;
            border-radius:8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Form Transaksi</h2>

        <label>Nama Pelanggan</label>
        <input type="text" id="nama">

        <label>Nama Produk</label>
        <input type="text" id="produk">

        <label>Harga Produk</label>
        <input type="number" id="harga">

        <label>Jumlah Pembelian</label>
        <input type="number" id="jumlah">

        <button class="hitung" onclick="hitung()">Hitung</button>
        <button class="reset" onclick="resetForm()">Reset</button>

        <div id="hasil"></div>
    </div>

    <script>
        function hitung(){
            let nama=document.getElementById("nama").value;
            let produk=document.getElementById("produk").value;
            let harga=Number(document.getElementById("harga").value);
            let jumlah=Number(document.getElementById("jumlah").value);

            let total=harga*jumlah;
            let potongan=0;

            if(total>=1000000){
                potongan=50000;
            }

            let bayar=total-potongan;

            document.getElementById("hasil").innerHTML=
            "<h3>Hasil Perhitungan</h3>"+
            "<p>Nama Pelanggan : "+nama+"</p>"+
            "<p>Nama Produk : "+produk+"</p>"+
            "<p>Total Belanja : Rp "+total.toLocaleString('id-ID')+"</p>"+
            "<p>Potongan : Rp "+potongan.toLocaleString('id-ID')+"</p>"+
            "<p><b>Total Bayar : Rp "+bayar.toLocaleString('id-ID')+"</b></p>";
        }

        function resetForm(){
            document.getElementById("nama").value="";
            document.getElementById("produk").value="";
            document.getElementById("harga").value="";
            document.getElementById("jumlah").value="";
            document.getElementById("hasil").innerHTML="";
        }
    </script>

</body>
</html>
